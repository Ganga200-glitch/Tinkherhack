<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

<div class="navbar">
    <h2>Admin Control Panel</h2>
    <button onclick="goHome()">Logout</button>
</div>

<div class="container">

    <div class="card">
        <h3>Domain Simulation</h3>

        <select id="domainSelect" onchange="simulateDomain()">
            <option value="college">College Workflow</option>
            <option value="healthcare">Healthcare Workflow</option>
            <option value="government">Government Workflow</option>
        </select>

        <div id="domainPreview"></div>
    </div>

    <div class="card">
        <h3>View Rule Configuration</h3>

        <input type="text"
               id="adminRequestType"
               value="Scholarship">

        <button onclick="adminViewRules()">Load Rule</button>

        <div id="adminRulesDisplay"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
