<!DOCTYPE html>
<html>
<head>
    <title>Authority Dashboard</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

<div class="navbar">
    <h2 id="roleTitle"></h2>
    <button onclick="goHome()">Logout</button>
</div>

<div class="container">

    <div class="card">
        <button onclick="loadRequests()">Load Pending Requests</button>
    </div>

    <div id="requests" class="request-grid"></div>

</div>

<!-- Reject Modal -->
<div id="rejectModal" class="modal">
    <div class="modal-content">
        <h3>Reject Request</h3>
        <textarea id="rejectReason"
                  placeholder="Enter rejection reason"></textarea>

        <div class="modal-buttons">
            <button onclick="confirmReject()">Confirm</button>
            <button class="reject-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
