<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

<div class="navbar">
    <h2>Student Portal</h2>
    <button onclick="goHome()">Logout</button>
</div>

<div class="container">

    <div class="card">
        <h3>Check Scholarship Requirements</h3>
        <button onclick="getRequirements()">View Rules</button>
        <div id="requirements"></div>
    </div>

    <div class="card">
        <h3>Submit Scholarship Application</h3>

        <form id="submitForm">
            <input type="number" id="student_id" placeholder="Student ID" required>

            <input type="text" id="request_type"
                   value="Scholarship" readonly>

            <label>Caste Certificate</label>
            <input type="file" id="caste_doc">

            <label>Income Certificate</label>
            <input type="file" id="income_doc">

            <button type="submit">Submit Application</button>
        </form>

        <pre id="response"></pre>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
