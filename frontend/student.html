<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body onload="loadStudentRequests()">

<div class="navbar">
    <h2>Student Portal</h2>
    <button onclick="goHome()">Logout</button>
</div>

<div class="container">

    <!-- REQUIREMENTS -->
    <div class="card">
        <h3>Scholarship Requirements</h3>

        <select id="request_type">
            <option value="Scholarship">Scholarship</option>
        </select>

        <button onclick="getRequirements()">Load Requirements</button>

        <div id="requirements"></div>
        <div id="docChecklist"></div>
    </div>

    <!-- SUBMIT FORM -->
    <div class="card">
        <h3>Submit Application</h3>

        <form id="submitForm">
            <input type="number" id="student_id"
                   placeholder="Student ID" required>

            <input type="text"
                   value="Scholarship" readonly>

            <label>Caste Certificate *</label>
            <input type="file" id="caste_doc" required>

            <label>Income Certificate *</label>
            <input type="file" id="income_doc" required>

            <button type="submit" id="submitBtn" disabled>
                Submit
            </button>
        </form>

        <div id="response"></div>
    </div>

    <!-- STUDENT TRACKING -->
    <div class="card">
        <h3>My Applications</h3>

        <button onclick="loadStudentRequests()">
            Refresh Applications
        </button>

        <div id="myRequests"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
